<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AskGabe — No problem</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--ink:#111210;--gold:#c08a22;--gold-pale:#fdf7e8;--white:#fff;--sans:'DM Sans',system-ui,sans-serif;--serif:'Instrument Serif',Georgia,serif}
  body{font-family:var(--sans);background:var(--white);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .card{max-width:460px;width:100%;text-align:center}
  .icon{width:64px;height:64px;background:#fafaf8;border:1px solid rgba(17,18,16,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;font-size:1.75rem}
  h1{font-family:var(--serif);font-size:2rem;font-weight:400;margin-bottom:1rem}
  p{font-size:0.92rem;color:#4a4640;line-height:1.75;margin-bottom:1.5rem}
  .btns{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap}
  .btn-primary{display:inline-block;background:var(--ink);color:white;padding:0.85rem 2rem;border-radius:100px;text-decoration:none;font-size:0.88rem;font-weight:500;transition:background 0.2s}
  .btn-primary:hover{background:var(--gold)}
  .btn-ghost{display:inline-block;background:transparent;color:var(--ink);border:1px solid rgba(17,18,16,0.15);padding:0.85rem 2rem;border-radius:100px;text-decoration:none;font-size:0.88rem;transition:all 0.2s}
  .btn-ghost:hover{border-color:var(--ink)}
</style>
</head>
<body>
<div class="card">
  <div class="icon">👋</div>
  <h1>No problem at all.</h1>
  <p>You didn't complete checkout — and that's completely fine. If you have any questions about what's included or want to talk through the right option for you, feel free to reach out.</p>
  <p>Whenever you're ready, the community will be here.</p>
  <div class="btns">
    <a href="/#pricing" class="btn-primary">Back to pricing</a>
    <a href="/" class="btn-ghost">Back to home</a>
  </div>
</div>
</body>
</html>
